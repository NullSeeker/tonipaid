<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toni Paid</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <header>
        <div class="logo">Toni<span>Paid</span></div>
        <div class="menu-icon">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </div>
    </header>

    <div class="user-card">
        <div class="user-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="user-info">
            <p>Welcome back,</p>
            <h3>Happy Name!</h3>
        </div>
    </div>

    <div class="main-content">
        
        <div id="homeView">
            <div class="balance-card">
                <div class="card-header">
                    <div class="card-title">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                        <h2 id="walletLabel">Cash Wallet</h2>
                    </div>
                </div>
                <h2 class="balance-text" id="walletBalance">₱ 0.00</h2>
                
                <div class="history-filters" style="margin-top: 15px;">
                    <button class="filter-btn active" id="btnCash" onclick="switchWallet('cash')">CASH</button>
                    <button class="filter-btn" id="btnCashless" onclick="switchWallet('cashless')">CASHLESS</button>
                </div>
            </div>
            
            <div class="emergency-fund-alert">
                💡 Log your daily expenses to keep your chart updated!
            </div>
        </div>

        <div id="historyView" style="display: none;">
            
            <div class="balance-card">
                <div class="card-header">
                    <div class="card-title">
                        <h2>Distribution</h2>
                    </div>
                </div>
                <div class="chart-container" style="margin-top: 15px;">
                    <div class="canvas-wrapper">
                        <canvas id="expenseChart"></canvas>
                        <div class="chart-center-text">
                            <div class="percent" id="centerPercent">0%</div>
                            <div class="label" id="centerLabel">None</div>
                        </div>
                    </div>
                    <div class="legend" id="chartLegend"></div>
                </div>
            </div>

            <div class="balance-card history-content">
                <div class="history-header">
                    <h3>Recent Logs</h3>
                </div>
                <div class="transaction-list" id="txHistory">
                    </div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h3>Add Transaction</h3>
            <div class="input-group">
                <label>Type</label>
                <select id="txType">
                    <option value="out">Expense (Money Out)</option>
                    <option value="in">Income (Money In)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Category</label>
                <select id="txCategory">
                    <option value="Food">Food</option>
                    <option value="Bills">Bills</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Fun">Fun</option>
                    <option value="Transport">Transport</option>
                </select>
            </div>
            <div class="input-group">
                <label>Amount (₱)</label>
                <input type="number" id="txAmount" placeholder="0.00" min="1">
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="txDate">
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="addTransaction()">Save</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="nav-icon" onclick="switchView('home')" id="navHome" style="color: #ccaa39;">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </div>
        
        <div class="nav-fab" onclick="openModal()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
        
        <div class="nav-icon" onclick="switchView('history')" id="navHistory">
            <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
            <span>History</span>
        </div>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
